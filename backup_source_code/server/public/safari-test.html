<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Safari Test Page</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
      /* Safari-compatible background syntax */
      background-color: #1A402B; /* Fallback */
    }
    
    .bg-image {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -1;
    }
    
    .content {
      width: 90%;
      max-width: 800px;
      margin-top: 50px;
      background-color: rgba(34, 84, 61, 0.8);
      border: 2px solid rgba(255, 235, 59, 0.7);
      border-radius: 12px;
      padding: 30px;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.3);
      text-align: center;
      margin-bottom: 40px;
    }
    
    h1 {
      color: #FFEB3B;
      margin-bottom: 30px;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.4);
    }
    
    .button-container {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 30px;
    }
    
    .forest-button {
      background: #2D694E;
      color: #FFEB3B;
      font-size: 24px;
      font-weight: bold;
      text-transform: uppercase;
      padding: 15px 30px;
      border: 3px solid #FFEB3B;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 20px;
      width: 90%;
      max-width: 500px;
    }
    
    .save-button {
      background-color: #FF0000;
      color: white;
      border: 4px solid white;
      font-size: 28px;
      padding: 20px;
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      width: 90%;
      max-width: 400px;
    }
    
    .navigation {
      margin-top: 40px;
      display: flex;
      justify-content: space-around;
      width: 100%;
    }
    
    a {
      color: #FFEB3B;
      text-decoration: none;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <!-- Using regular image tag for background instead of CSS background-image -->
  <img src="/images/forest-background.png" class="bg-image" alt="Forest background">
  
  <div class="content">
    <h1>Safari Compatibility Test</h1>
    
    <p>This page is specifically designed to test compatibility with Safari browsers.</p>
    
    <p>If you're seeing this text but not the forest background, there might be an issue with how Safari is loading the image.</p>
    
    <div class="button-container">
      <button class="forest-button" onclick="window.location.href='/emergency-save'">
        Go to Emergency Save
      </button>
      
      <button class="forest-button" onclick="alert('Test button clicked')">
        Test Button Visibility
      </button>
    </div>
    
    <div class="navigation">
      <a href="/">Home</a>
      <a href="/direct-forest.html">Forest Test</a>
      <a href="/emergency-save">Emergency Save</a>
    </div>
  </div>
  
  <button class="forest-button save-button" onclick="saveWorkout()">
    SAVE WORKOUT
  </button>
  
  <script>
    function saveWorkout() {
      alert('Attempting to save workout for Safari...');
      
      const workout = {
        date: new Date().toISOString().split('T')[0],
        weight: '70',
        mobility: { completion: 'full-session' },
        handstand: { exercises: [] },
        strength: { exercises: [] }
      };
      
      fetch('/api/workouts', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(workout)
      })
      .then(response => {
        if (response.ok) {
          alert('SUCCESS: Workout saved from Safari!');
        } else {
          alert('ERROR: Failed to save workout from Safari');
        }
      })
      .catch(error => {
        alert('ERROR: ' + error.message);
      });
    }
    
    // Check for Safari
    const isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);
    console.log("Is Safari: ", isSafari);
    
    // Log image load events
    document.querySelector('.bg-image').addEventListener('load', function() {
      console.log('Background image loaded successfully');
    });
    
    document.querySelector('.bg-image').addEventListener('error', function() {
      console.log('Error loading background image');
      // Try fallback image
      this.src = 'https://images.unsplash.com/photo-1448375240586-882707db888b?q=80&w=1000';
    });
  </script>
</body>
</html>
