<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    .big-button {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background-color: red;
      color: white;
      padding: 30px;
      font-size: 24px;
      border: 5px solid white;
      border-radius: 15px;
      font-weight: bold;
      cursor: pointer;
      text-align: center;
      width: 300px;
      height: 300px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 30px 10px rgba(255,255,255,0.5);
    }
  </style>
</head>
<body style="background-color: #22543D; margin: 0; padding: 0; height: 100vh; width: 100vw;">
  <button class="big-button" onclick="saveWorkout()">
    EMERGENCY<br>SAVE<br>WORKOUT
  </button>

  <script>
    function saveWorkout() {
      const workout = {
        date: new Date().toISOString().split('T')[0],
        weight: '70',
        mobility: { completion: 'full-session' },
        handstand: { exercises: [] },
        strength: { exercises: [] }
      };
      
      fetch('/api/workouts', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(workout)
      })
      .then(response => {
        if (response.ok) {
          alert('SUCCESS: Workout saved!');
        } else {
          alert('ERROR: Failed to save workout');
        }
      })
      .catch(error => {
        alert('ERROR: ' + error.message);
      });
    }
  </script>
</body>
</html>
