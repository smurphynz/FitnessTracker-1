<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minimal Test</title>
  <style>
    body {
      margin: 20px;
      font-family: Arial, sans-serif;
    }
  </style>
</head>
<body>
  <h1>Minimal Test Page</h1>
  
  <select id="test-select">
    <option value="">Choose an option</option>
    <option value="option1">Option 1</option>
    <option value="option2">Option 2</option>
    <option value="option3">Option 3</option>
  </select>
  
  <button id="test-button" style="margin-top: 10px; padding: 5px 10px;">
    Test Button
  </button>
  
  <div id="output" style="margin-top: 20px; border: 1px solid #ccc; padding: 10px; min-height: 100px;">
    Output will appear here
  </div>
  
  <script>
    document.getElementById('test-button').addEventListener('click', function() {
      const selected = document.getElementById('test-select').value;
      const output = document.getElementById('output');
      
      if (selected) {
        output.textContent = 'You selected: ' + selected;
      } else {
        output.textContent = 'Please select an option first';
      }
    });
  </script>
</body>
</html>
