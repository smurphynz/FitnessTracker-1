<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Emergency Save Button</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: black;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial, sans-serif;
    }
    
    .big-red-button {
      background-color: red;
      color: white;
      font-size: 32px;
      font-weight: bold;
      padding: 40px 80px;
      border: 10px solid white;
      border-radius: 20px;
      cursor: pointer;
      text-align: center;
      box-shadow: 0 0 50px 20px rgba(255,255,255,0.7);
      text-transform: uppercase;
    }
    
    .big-red-button:hover {
      background-color: darkred;
    }
  </style>
</head>
<body>
  <button class="big-red-button" onclick="saveWorkout()">
    SAVE WORKOUT NOW
  </button>

  <script>
    function saveWorkout() {
      alert("Emergency Save Button clicked!");
      
      // Create a basic workout object
      const workout = {
        date: new Date().toISOString().split('T')[0],
        weight: '70',
        mobility: { completion: 'full-session' },
        handstand: { exercises: [] },
        strength: { exercises: [] }
      };
      
      // Send to API
      fetch('/api/workouts', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(workout)
      })
      .then(response => {
        if (response.ok) {
          alert("Workout saved successfully!");
          window.location.href = "/";
        } else {
          alert("Failed to save workout");
        }
      })
      .catch(error => {
        alert("Error: " + error.message);
      });
    }
  </script>
</body>
</html>
