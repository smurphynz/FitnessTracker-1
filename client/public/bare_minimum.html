<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Absolute Minimum Button</title>
  <!-- Load emergency CSS that overrides everything -->
  <link rel="stylesheet" href="/emergency.css">
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: black;
      text-align: center;
      min-height: 100vh;
    }
  </style>
</head>
<body>
  <!-- Simple HTML with no frameworks, libraries or complex styling -->
  <h1 style="color: white; margin-top: 20px;">EMERGENCY SAVE PAGE</h1>
  
  <button 
    onclick="saveEmergencyWorkout()" 
    class="emergency-button"
  >
    SAVE WORKOUT NOW
  </button>

  <script>
    // Simple vanilla JavaScript function
    function saveEmergencyWorkout() {
      alert('Attempting to save workout...');
      
      // Create a basic workout object
      const workout = {
        date: new Date().toISOString().split('T')[0],
        weight: '70',
        mobility: { completion: 'full-session' },
        handstand: { exercises: [] },
        strength: { exercises: [] }
      };
      
      // Send to API with basic fetch
      fetch('/api/workouts', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(workout)
      })
      .then(response => {
        if (response.ok) {
          alert('SUCCESS: Workout saved!');
          // Redirect back to home
          window.location.href = '/';
        } else {
          alert('ERROR: Failed to save workout');
        }
      })
      .catch(error => {
        alert('ERROR: ' + error.message);
      });
    }
  </script>
</body>
</html>
