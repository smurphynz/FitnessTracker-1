<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <g opacity="0.1">
    <!-- Abstract forest pattern - triangular trees -->
    <polygon points="50,700 100,550 150,700" fill="#4B9872" />
    <polygon points="150,700 200,500 250,700" fill="#3C825F" />
    <polygon points="250,700 300,600 350,700" fill="#2D694E" />
    <polygon points="350,700 400,450 450,700" fill="#4B9872" />
    <polygon points="450,700 500,580 550,700" fill="#22543D" />
    <polygon points="550,700 600,520 650,700" fill="#3C825F" />
    <polygon points="650,700 700,620 750,700" fill="#4B9872" />
    
    <!-- Second row of trees -->
    <polygon points="0,700 30,600 60,700" fill="#22543D" />
    <polygon points="80,700 110,620 140,700" fill="#2D694E" />
    <polygon points="180,700 220,550 260,700" fill="#3C825F" />
    <polygon points="280,700 320,630 360,700" fill="#22543D" />
    <polygon points="380,700 420,580 460,700" fill="#2D694E" />
    <polygon points="480,700 520,650 560,700" fill="#4B9872" />
    <polygon points="580,700 620,500 660,700" fill="#3C825F" />
    <polygon points="680,700 720,600 760,700" fill="#22543D" />
    
    <!-- Third row of smaller trees -->
    <polygon points="20,700 35,650 50,700" fill="#3C825F" />
    <polygon points="120,700 140,670 160,700" fill="#4B9872" />
    <polygon points="220,700 240,630 260,700" fill="#22543D" />
    <polygon points="320,700 340,650 360,700" fill="#3C825F" />
    <polygon points="420,700 440,660 460,700" fill="#2D694E" />
    <polygon points="520,700 540,640 560,700" fill="#4B9872" />
    <polygon points="620,700 640,650 660,700" fill="#22543D" />
    <polygon points="720,700 740,670 760,700" fill="#3C825F" />
    
    <!-- Distant mountains in the background -->
    <polygon points="0,500 100,300 200,480 300,200 400,450 500,300 600,400 700,250 800,500" fill="#1A402B" />
    
    <!-- Stars/fireflies scattered through the forest -->
    <circle cx="100" cy="400" r="1" fill="#FFEB3B" />
    <circle cx="200" cy="350" r="1" fill="#FFEB3B" />
    <circle cx="300" cy="420" r="1" fill="#FFEB3B" />
    <circle cx="400" cy="380" r="1" fill="#FFEB3B" />
    <circle cx="500" cy="410" r="1" fill="#FFEB3B" />
    <circle cx="600" cy="370" r="1" fill="#FFEB3B" />
    <circle cx="700" cy="430" r="1" fill="#FFEB3B" />
    <circle cx="150" cy="380" r="1" fill="#FFEB3B" />
    <circle cx="250" cy="410" r="1" fill="#FFEB3B" />
    <circle cx="350" cy="370" r="1" fill="#FFEB3B" />
    <circle cx="450" cy="400" r="1" fill="#FFEB3B" />
    <circle cx="550" cy="390" r="1" fill="#FFEB3B" />
    <circle cx="650" cy="420" r="1" fill="#FFEB3B" />
  </g>
</svg>
