<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sean's Cali Fitness Tracker</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      color: white;
      min-height: 100vh;
      width: 100%;
      overflow-x: hidden;
      position: relative;
    }
    
    .background-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      overflow: hidden;
    }
    
    .background {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: brightness(0.7);
    }
    
    /* Override with forest background */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #1A402B;
      z-index: -2;
    }
    
    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
    }
    
    header {
      margin-bottom: 20px;
      text-align: center;
    }
    
    h1 {
      font-size: 28px;
      color: #FFEB3B;
      margin-bottom: 10px;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
    }
    
    .header-controls {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 20px;
    }
    
    .input-group {
      display: flex;
      flex-direction: column;
    }
    
    label {
      font-weight: bold;
      margin-bottom: 5px;
      color: #FFEB3B;
    }
    
    input, select {
      padding: 12px;
      border: none;
      border-radius: 8px;
      background-color: rgba(255, 255, 255, 0.9);
      font-size: 16px;
    }
    
    .tab-navigation {
      display: flex;
      margin-top: 30px;
      border-bottom: 2px solid #FFEB3B;
    }
    
    .tab {
      flex: 1;
      text-align: center;
      padding: 12px;
      background-color: rgba(0, 0, 0, 0.3);
      cursor: pointer;
      transition: all 0.2s ease;
    }
    
    .tab.active {
      background-color: rgba(255, 235, 59, 0.3);
      font-weight: bold;
    }
    
    .tab-content {
      margin-top: 20px;
      background-color: rgba(0, 0, 0, 0.5);
      border-radius: 10px;
      padding: 20px;
    }
    
    .section {
      margin-bottom: 30px;
      padding: 20px;
      background-color: rgba(0, 0, 0, 0.3);
      border-radius: 10px;
    }
    
    h2 {
      color: #FFEB3B;
      margin-bottom: 15px;
      border-bottom: 1px solid rgba(255, 235, 59, 0.5);
      padding-bottom: 10px;
    }
    
    .mobility-options {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 15px;
    }
    
    .mobility-option {
      padding: 12px;
      text-align: center;
      background-color: rgba(0, 0, 0, 0.3);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    
    .mobility-option.selected {
      background-color: #4CAF50;
      font-weight: bold;
    }
    
    .day-selector {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 15px;
    }
    
    .day-button {
      padding: 12px;
      text-align: center;
      background-color: rgba(0, 0, 0, 0.3);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    
    .day-button.selected {
      background-color: #2196F3;
      font-weight: bold;
    }
    
    .exercises-list {
      display: flex;
      flex-direction: column;
      gap: 15px;
      margin-top: 20px;
    }
    
    .exercise-card {
      background-color: rgba(0, 0, 0, 0.3);
      border-radius: 8px;
      padding: 15px;
    }
    
    .exercise-title {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
      align-items: center;
    }
    
    .sets-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 10px;
    }
    
    .set-item {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .set-number {
      font-weight: bold;
      color: #FFEB3B;
      width: 30px;
    }
    
    .button {
      padding: 10px 15px;
      background-color: #2196F3;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
    }
    
    .button.add {
      background-color: #4CAF50;
    }
    
    .button.remove {
      background-color: #F44336;
    }
    
    .handstand-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 15px;
    }
    
    .handstand-item {
      background-color: rgba(0, 0, 0, 0.3);
      padding: 10px;
      border-radius: 5px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .exercise-selector {
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      border: none;
      border-radius: 8px;
      background-color: rgba(255, 255, 255, 0.9);
      font-size: 16px;
    }
    
    .workout-cards {
      display: flex;
      flex-direction: column;
      gap: 20px;
      margin-top: 20px;
    }
    
    .workout-card {
      background-color: rgba(0, 0, 0, 0.3);
      border-radius: 10px;
      padding: 20px;
    }
    
    .workout-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 15px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.2);
      padding-bottom: 10px;
    }
    
    .workout-date {
      font-size: 18px;
      font-weight: bold;
      color: #FFEB3B;
    }
    
    .workout-weight {
      font-size: 16px;
    }
    
    .workout-section {
      margin-top: 15px;
    }
    
    .workout-section-title {
      color: #FFEB3B;
      margin-bottom: 10px;
      font-size: 16px;
    }
    
    .save-button {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 15px 30px;
      background-color: #F44336;
      color: white;
      border: none;
      border-radius: 50px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
      z-index: 10;
    }
    
    .message {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 15px 30px;
      background-color: #4CAF50;
      color: white;
      border-radius: 5px;
      font-weight: bold;
      display: none;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
      z-index: 100;
    }
    
    .message.error {
      background-color: #F44336;
    }
    
    @media (min-width: 768px) {
      .header-controls {
        flex-direction: row;
      }
      
      .input-group {
        flex: 1;
      }
    }
  </style>
</head>
<body>
  <div class="background-container">
    <img src="/forest-background.png" class="background" alt="Forest background">
  </div>
  
  <div class="container">
    <header>
      <h1>Sean's Cali Fitness Tracker</h1>
      
      <div class="header-controls">
        <div class="input-group">
          <label for="date">Date</label>
          <input type="date" id="date" value="">
        </div>
        
        <div class="input-group">
          <label for="weight">Weight (kg)</label>
          <input type="number" id="weight" placeholder="Enter weight">
        </div>
      </div>
    </header>
    
    <div class="tab-navigation">
      <div class="tab active" data-tab="workout">Workout</div>
      <div class="tab" data-tab="progress">Progress</div>
    </div>
    
    <div class="tab-content">
      <!-- Workout Tab Content -->
      <div id="workout-tab" style="display: block;">
        <!-- Mobility Section -->
        <div class="section">
          <h2>Mobility</h2>
          
          <div class="day-selector">
            <div class="day-button" data-day="1">Day 1</div>
            <div class="day-button" data-day="2">Day 2</div>
            <div class="day-button" data-day="3">Day 3</div>
          </div>
          
          <p style="margin-top: 15px;">Completion:</p>
          <div class="mobility-options">
            <div class="mobility-option" data-completion="not-completed">Not completed</div>
            <div class="mobility-option" data-completion="half-session">Half session</div>
            <div class="mobility-option selected" data-completion="full-session">Full session</div>
          </div>
        </div>
        
        <!-- Handstand Section -->
        <div class="section">
          <h2>Handstand</h2>
          
          <select id="handstand-selector" class="exercise-selector">
            <option value="">Select handstand exercise</option>
            <option value="Wall Hold">Wall Hold</option>
            <option value="Chest to Wall">Chest to Wall</option>
            <option value="Back to Wall">Back to Wall</option>
            <option value="Freestanding Hold">Freestanding Hold</option>
            <option value="Handstand Push-up">Handstand Push-up</option>
          </select>
          
          <div id="handstand-exercises" class="handstand-list">
            <!-- Handstand exercises will be added here -->
          </div>
        </div>
        
        <!-- Strength Section -->
        <div class="section">
          <h2>Strength</h2>
          
          <div class="day-selector">
            <div class="day-button" data-day="1">Day 1</div>
            <div class="day-button" data-day="2">Day 2</div>
            <div class="day-button" data-day="3">Day 3</div>
          </div>
          
          <select id="strength-selector" class="exercise-selector">
            <option value="">Select strength exercise</option>
            <!-- Exercise options will be populated by JavaScript -->
          </select>
          
          <div id="strength-exercises" class="exercises-list">
            <!-- Strength exercises will be added here -->
          </div>
        </div>
      </div>
      
      <!-- Progress Tab Content -->
      <div id="progress-tab" style="display: none;">
        <div class="section">
          <h2>Workout History</h2>
          
          <div id="workout-cards" class="workout-cards">
            <!-- Workout cards will be loaded here -->
            <div class="workout-card">
              <div class="workout-header">
                <div class="workout-date">Loading...</div>
                <div class="workout-weight"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  
  <div id="success-message" class="message">Workout saved successfully!</div>
  <div id="error-message" class="message error">Failed to save workout</div>
  
  <button id="save-button" class="save-button">SAVE WORKOUT</button>
  
  <script>
    // Initialize date to today
    document.getElementById('date').valueAsDate = new Date();
    
    // Tab navigation
    const tabs = document.querySelectorAll('.tab');
    const tabContents = {
      'workout': document.getElementById('workout-tab'),
      'progress': document.getElementById('progress-tab')
    };
    
    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        const tabName = tab.getAttribute('data-tab');
        
        // Update active tab
        tabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        
        // Show active content
        for (const [name, content] of Object.entries(tabContents)) {
          content.style.display = name === tabName ? 'block' : 'none';
        }
        
        // If switching to progress tab, load workouts
        if (tabName === 'progress') {
          loadWorkouts();
        }
      });
    });
    
    // Mobility completion selection
    const mobilityOptions = document.querySelectorAll('.mobility-option');
    let selectedMobilityCompletion = 'full-session';
    
    mobilityOptions.forEach(option => {
      option.addEventListener('click', () => {
        mobilityOptions.forEach(o => o.classList.remove('selected'));
        option.classList.add('selected');
        selectedMobilityCompletion = option.getAttribute('data-completion');
      });
    });
    
    // Day selection for mobility and strength
    const dayButtons = document.querySelectorAll('.day-button');
    let selectedMobilityDay = null;
    let selectedStrengthDay = null;
    
    dayButtons.forEach(button => {
      button.addEventListener('click', () => {
        const section = button.closest('.section');
        const day = parseInt(button.getAttribute('data-day'));
        
        // Clear selection in this section only
        section.querySelectorAll('.day-button').forEach(b => b.classList.remove('selected'));
        
        // Set new selection
        button.classList.add('selected');
        
        // Update selected day based on section
        if (section.querySelector('h2').textContent === 'Mobility') {
          selectedMobilityDay = day;
        } else if (section.querySelector('h2').textContent === 'Strength') {
          selectedStrengthDay = day;
        }
      });
    });
    
    // Handstand exercises
    const handstandSelector = document.getElementById('handstand-selector');
    const handstandExercisesList = document.getElementById('handstand-exercises');
    const handstandExercises = [];
    
    handstandSelector.addEventListener('change', () => {
      const exercise = handstandSelector.value;
      if (exercise && !handstandExercises.includes(exercise)) {
        handstandExercises.push(exercise);
        updateHandstandExercises();
        handstandSelector.value = '';
      }
    });
    
    function updateHandstandExercises() {
      handstandExercisesList.innerHTML = '';
      
      handstandExercises.forEach((exercise, index) => {
        const item = document.createElement('div');
        item.className = 'handstand-item';
        item.innerHTML = `
          <span>${exercise}</span>
          <button class="button remove" data-index="${index}">Remove</button>
        `;
        handstandExercisesList.appendChild(item);
      });
      
      // Add event listeners to remove buttons
      document.querySelectorAll('.handstand-item .button.remove').forEach(button => {
        button.addEventListener('click', () => {
          const index = parseInt(button.getAttribute('data-index'));
          handstandExercises.splice(index, 1);
          updateHandstandExercises();
        });
      });
    }
    
    // Strength exercises
    const strengthSelector = document.getElementById('strength-selector');
    const strengthExercisesList = document.getElementById('strength-exercises');
    const strengthExercises = [];
    
    // Populate strength exercise options
    const timeBasedExercises = ["L-Sit", "Side Plank Left", "Side Plank Right", "Tuck Front Lever", "Tuck Back Lever"];
    const repBasedExercises = ["Push-up", "Pike Push-up", "Pull-up", "Chin-up", "Dip", "Row", "Squat", "Pistol Squat Left", "Pistol Squat Right", "Lunge", "Nordic Curl", "Glute Bridge"];
    const allStrengthExercises = [...timeBasedExercises, ...repBasedExercises].sort();
    
    allStrengthExercises.forEach(exercise => {
      const option = document.createElement('option');
      option.value = exercise;
      option.textContent = exercise;
      strengthSelector.appendChild(option);
    });
    
    strengthSelector.addEventListener('change', () => {
      const exercise = strengthSelector.value;
      if (exercise) {
        const isTimeBased = timeBasedExercises.includes(exercise);
        
        const newExercise = {
          name: exercise,
          sets: [{
            value: isTimeBased ? 30 : 10
          }]
        };
        
        strengthExercises.push(newExercise);
        updateStrengthExercises();
        strengthSelector.value = '';
      }
    });
    
    function updateStrengthExercises() {
      strengthExercisesList.innerHTML = '';
      
      strengthExercises.forEach((exercise, exerciseIndex) => {
        const isTimeBased = timeBasedExercises.includes(exercise.name);
        const card = document.createElement('div');
        card.className = 'exercise-card';
        
        let setsHtml = '';
        exercise.sets.forEach((set, setIndex) => {
          setsHtml += `
            <div class="set-item">
              <span class="set-number">Set ${setIndex + 1}</span>
              <input type="number" class="set-value" data-exercise="${exerciseIndex}" data-set="${setIndex}" 
                     value="${set.value}" min="1">
              <span>${isTimeBased ? 'seconds' : 'reps'}</span>
              <button class="button remove" data-exercise="${exerciseIndex}" data-set="${setIndex}">Remove</button>
            </div>
          `;
        });
        
        card.innerHTML = `
          <div class="exercise-title">
            <h3>${exercise.name}</h3>
            <button class="button remove" data-exercise="${exerciseIndex}">Remove Exercise</button>
          </div>
          <div class="sets-list">
            ${setsHtml}
          </div>
          <button class="button add" data-exercise="${exerciseIndex}">Add Set</button>
        `;
        
        strengthExercisesList.appendChild(card);
      });
      
      // Add event listeners to buttons in strength exercises
      document.querySelectorAll('.exercise-card .button').forEach(button => {
        button.addEventListener('click', () => {
          const exerciseIndex = parseInt(button.getAttribute('data-exercise'));
          
          if (button.classList.contains('add')) {
            // Add a new set
            const exercise = strengthExercises[exerciseIndex];
            const isTimeBased = timeBasedExercises.includes(exercise.name);
            exercise.sets.push({ value: isTimeBased ? 30 : 10 });
            updateStrengthExercises();
          } else if (button.classList.contains('remove')) {
            if (button.hasAttribute('data-set')) {
              // Remove a set
              const setIndex = parseInt(button.getAttribute('data-set'));
              strengthExercises[exerciseIndex].sets.splice(setIndex, 1);
              
              // If no sets left, remove the exercise
              if (strengthExercises[exerciseIndex].sets.length === 0) {
                strengthExercises.splice(exerciseIndex, 1);
              }
            } else {
              // Remove entire exercise
              strengthExercises.splice(exerciseIndex, 1);
            }
            updateStrengthExercises();
          }
        });
      });
      
      // Add event listeners to set value inputs
      document.querySelectorAll('.set-value').forEach(input => {
        input.addEventListener('change', () => {
          const exerciseIndex = parseInt(input.getAttribute('data-exercise'));
          const setIndex = parseInt(input.getAttribute('data-set'));
          strengthExercises[exerciseIndex].sets[setIndex].value = parseInt(input.value);
        });
      });
    }
    
    // Load workouts for Progress tab
    async function loadWorkouts() {
      const workoutCards = document.getElementById('workout-cards');
      
      try {
        const response = await fetch('/api/workouts');
        if (!response.ok) {
          throw new Error('Failed to fetch workouts');
        }
        
        const workouts = await response.json();
        
        workoutCards.innerHTML = '';
        
        if (workouts.length === 0) {
          workoutCards.innerHTML = '<p>No workouts found</p>';
          return;
        }
        
        // Sort workouts by date, newest first
        workouts.sort((a, b) => new Date(b.date) - new Date(a.date));
        
        workouts.forEach(workout => {
          const card = document.createElement('div');
          card.className = 'workout-card';
          
          // Format the date
          const date = new Date(workout.date);
          const formattedDate = date.toLocaleDateString('en-US', { 
            weekday: 'long', 
            year: 'numeric', 
            month: 'long', 
            day: 'numeric' 
          });
          
          // Create HTML for the workout card
          let strengthHtml = '';
          if (workout.strength && workout.strength.exercises && workout.strength.exercises.length > 0) {
            strengthHtml = `
              <div class="workout-section">
                <div class="workout-section-title">Strength - Day ${workout.strength.day || 'N/A'}</div>
                <div class="workout-exercises">
                  ${workout.strength.exercises.map(exercise => `
                    <div class="workout-exercise">
                      <strong>${exercise.name}</strong>: 
                      ${exercise.sets.map(set => `${set.value} ${timeBasedExercises.includes(exercise.name) ? 'sec' : 'reps'}`).join(', ')}
                    </div>
                  `).join('')}
                </div>
              </div>
            `;
          }
          
          let handstandHtml = '';
          if (workout.handstand && workout.handstand.exercises && workout.handstand.exercises.length > 0) {
            handstandHtml = `
              <div class="workout-section">
                <div class="workout-section-title">Handstand</div>
                <div class="workout-exercises">
                  ${workout.handstand.exercises.join(', ')}
                </div>
              </div>
            `;
          }
          
          let mobilityHtml = '';
          if (workout.mobility) {
            const mobilityStatus = {
              'not-completed': 'Not completed',
              'half-session': 'Half session',
              'full-session': 'Full session'
            };
            
            mobilityHtml = `
              <div class="workout-section">
                <div class="workout-section-title">Mobility - Day ${workout.mobility.day || 'N/A'}</div>
                <div>${mobilityStatus[workout.mobility.completion] || workout.mobility.completion}</div>
              </div>
            `;
          }
          
          card.innerHTML = `
            <div class="workout-header">
              <div class="workout-date">${formattedDate}</div>
              <div class="workout-weight">${workout.weight ? workout.weight + ' kg' : ''}</div>
            </div>
            ${mobilityHtml}
            ${handstandHtml}
            ${strengthHtml}
          `;
          
          workoutCards.appendChild(card);
        });
        
      } catch (error) {
        console.error('Error loading workouts:', error);
        workoutCards.innerHTML = '<p>Error loading workouts</p>';
      }
    }
    
    // Handle saving workout
    const saveButton = document.getElementById('save-button');
    const successMessage = document.getElementById('success-message');
    const errorMessage = document.getElementById('error-message');
    
    saveButton.addEventListener('click', async () => {
      const date = document.getElementById('date').value;
      const weight = document.getElementById('weight').value;
      
      // Prepare workout data
      const workout = {
        date,
        weight,
        mobility: {
          day: selectedMobilityDay,
          completion: selectedMobilityCompletion
        },
        handstand: {
          exercises: handstandExercises
        },
        strength: {
          day: selectedStrengthDay,
          exercises: strengthExercises
        }
      };
      
      try {
        const response = await fetch('/api/workouts', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(workout)
        });
        
        if (!response.ok) {
          throw new Error('Failed to save workout');
        }
        
        // Show success message
        successMessage.style.display = 'block';
        setTimeout(() => {
          successMessage.style.display = 'none';
        }, 3000);
        
      } catch (error) {
        console.error('Error saving workout:', error);
        
        // Show error message
        errorMessage.style.display = 'block';
        setTimeout(() => {
          errorMessage.style.display = 'none';
        }, 3000);
      }
    });
    
    // Load initial data
    loadLastDays();
    
    // Function to load last days for mobility and strength
    async function loadLastDays() {
      try {
        // Load last mobility day
        const mobilityResponse = await fetch('/api/last-mobility-day');
        if (mobilityResponse.ok) {
          const { lastDay } = await mobilityResponse.json();
          if (lastDay !== null) {
            const nextDay = (lastDay % 3) + 1; // Cycle through 1-3
            const dayButtons = document.querySelectorAll('.section:nth-child(1) .day-button');
            dayButtons.forEach(button => {
              if (parseInt(button.getAttribute('data-day')) === nextDay) {
                button.click(); // Simulate click to select this day
              }
            });
          }
        }
        
        // Load last strength day
        const strengthResponse = await fetch('/api/last-strength-day');
        if (strengthResponse.ok) {
          const { lastDay } = await strengthResponse.json();
          if (lastDay !== null) {
            const nextDay = (lastDay % 3) + 1; // Cycle through 1-3
            const dayButtons = document.querySelectorAll('.section:nth-child(3) .day-button');
            dayButtons.forEach(button => {
              if (parseInt(button.getAttribute('data-day')) === nextDay) {
                button.click(); // Simulate click to select this day
              }
            });
          }
        }
      } catch (error) {
        console.error('Error loading last days:', error);
      }
    }
  </script>
