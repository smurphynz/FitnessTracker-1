<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forest Background Test</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      color: white;
      height: 100vh;
      width: 100vw;
      background-image: url('/images/forest-background.png');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    
    .container {
      width: 90%;
      max-width: 800px;
      background-color: rgba(34, 84, 61, 0.8);
      border: 2px solid rgba(255, 235, 59, 0.7);
      border-radius: 12px;
      padding: 30px;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.3);
      text-align: center;
    }
    
    h1 {
      color: #FFEB3B;
      margin-bottom: 30px;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.4);
    }
    
    .forest-button {
      background: linear-gradient(145deg, #3C825F, #22543D);
      color: #FFEB3B;
      font-size: 24px;
      font-weight: bold;
      text-transform: uppercase;
      padding: 15px 30px;
      border: 3px solid #FFEB3B;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 30px;
      box-shadow: 0 0 15px rgba(255, 235, 59, 0.3);
      text-shadow: 0 2px 2px rgba(0, 0, 0, 0.4);
    }
    
    .forest-button:hover {
      background: linear-gradient(145deg, #4B9872, #2D694E);
      box-shadow: 0 0 20px rgba(255, 235, 59, 0.5);
      transform: scale(1.05);
    }
    
    p {
      line-height: 1.6;
      margin-bottom: 20px;
      font-size: 18px;
    }
    
    a {
      color: #FFEB3B;
      text-decoration: none;
      font-weight: bold;
    }
    
    a:hover {
      text-decoration: underline;
    }
    
    .separator {
      width: 80%;
      height: 2px;
      background: linear-gradient(to right, transparent, rgba(255, 235, 59, 0.7), transparent);
      margin: 30px auto;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Sean's Cali Fitness Tracker</h1>
    
    <p>This page demonstrates the forest background and the styling for the fitness tracker app.</p>
    
    <div class="separator"></div>
    
    <p>If you'd like to save a workout directly, click the button below or visit <a href="/emergency-save">/emergency-save</a>.</p>
    
    <button class="forest-button" onclick="window.location.href='/emergency-save'">
      Save Workout
    </button>
    
    <div class="separator"></div>
    
    <p>Return to the <a href="/">main application</a></p>
  </div>
</body>
</html>
