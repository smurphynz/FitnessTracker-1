<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Sean's Cali Fitness Tracker</title>
    <meta name="description" content="Track your calisthenics workouts and progress">
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#1A402B" />
    <link rel="apple-touch-icon" href="/icon-192x192.png">
    
    <!-- Load emergency CSS that overrides everything -->
    <link rel="stylesheet" href="/emergency.css">
    
    <!-- Inline critical styles -->
    <style>
      /* Ensure nothing can hide our buttons */
      html, body {
        overflow: visible !important;
        height: auto !important;
      }
      
      #root {
        position: relative !important;
        z-index: 1 !important;
      }
      
      .absolute-link {
        position: fixed !important;
        top: 10px !important;
        left: 10px !important;
        z-index: 2147483647 !important;
        background-color: black !important;
        color: yellow !important;
        padding: 10px !important;
        border: 3px solid yellow !important;
        border-radius: 5px !important;
        font-weight: bold !important;
        text-decoration: none !important;
        font-family: Arial, sans-serif !important;
        font-size: 16px !important;
        box-shadow: 0 0 20px 5px rgba(255, 255, 0, 0.7) !important;
      }
    </style>
  </head>
  <body>
    <!-- Direct link to emergency page -->
    <a href="/bare_minimum.html" class="absolute-link">EMERGENCY SAVE PAGE →</a>
    
    <div id="root"></div>
    
    <!-- Emergency fixed button outside of React -->
    <button 
      id="emergency-save-button"
      onclick="saveEmergencyWorkout()"
      style="
        position: fixed !important; 
        bottom: 20px !important; 
        left: 50% !important; 
        transform: translateX(-50%) !important;
        background-color: #FF0000 !important; 
        color: #FFFFFF !important; 
        font-size: 24px !important; 
        font-weight: bold !important; 
        padding: 16px 32px !important; 
        border-radius: 10px !important;
        z-index: 2147483647 !important;
        border: 4px solid white !important;
        box-shadow: 0px 0px 30px 10px rgba(255,255,255,1) !important;
        width: 80% !important;
        display: block !important;
        visibility: visible !important;
        opacity: 1 !important;
      "
    >
      EMERGENCY SAVE
    </button>
    
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Vanilla JavaScript for emergency save function -->
    <script>
      function saveEmergencyWorkout() {
        alert('Attempting to save workout...');
        
        // Create a basic workout object
        const workout = {
          date: new Date().toISOString().split('T')[0],
          weight: '70',
          mobility: { completion: 'full-session' },
          handstand: { exercises: [] },
          strength: { exercises: [] }
        };
        
        // Send to API with basic fetch
        fetch('/api/workouts', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(workout)
        })
        .then(response => {
          if (response.ok) {
            alert('SUCCESS: Workout saved!');
          } else {
            alert('ERROR: Failed to save workout');
          }
        })
        .catch(error => {
          alert('ERROR: ' + error.message);
        });
      }
    </script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/service-worker.js')
            .then(registration => {
              console.log('ServiceWorker registered: ', registration);
            })
            .catch(error => {
              console.log('ServiceWorker registration failed: ', error);
            });
        });
      }
    </script>
    <!-- This is a replit script which adds a banner on the top of the page when opened in development mode outside the replit environment -->
    <script type="text/javascript" src="https://replit.com/public/js/replit-dev-banner.js"></script>
  </body>
</html>
